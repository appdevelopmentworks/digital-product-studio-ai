  notes: |
    初期コンテンツは v0.2 改訂方針指示書で 5-10 本想定だった範囲の最小値 7 本で実装。
    各記事は 2,500-5,000 字、FAQPage 構造化データ付き、Person スキーマ(著者)付き。

# ===============================================================
# 多言語(en)対応状況
# ===============================================================
i18n_status:
  enabled_locales: [ja, en]
  default_locale: ja
  en_pages_count: 5                     # 主要 5 ページのみ(top / about / services / works / contact)
  ja_only_pages_count: 6                # services 詳細 / works 詳細 / blog / blog 詳細 / careers / privacy
  hreflang_implemented: true
  llms_txt_en: false                    # /en/llms.txt は v0.4 で対応(M-002)
