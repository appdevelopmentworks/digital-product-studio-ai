  # =========================================================
  # DEC-010: WMAO 引継ぎ partial scope で実施(自社案件特殊扱い)
  # =========================================================
  - id: DEC-010
    type: handoff
    title: WMAO 引継ぎを partial scope で実施(継続コンテンツ + SEO/GEO 改善のみ)
    decided_at: 2026-07-15
    decided_by:
      - role: delivery-director
        name: delivery-director
      - role: product-director
        name: product-director(自社案件のため横相談)
      - role: 決裁者
        name: Shin
    proposed_by: delivery-director
    impacted_agents:
      - delivery-director
      - product-director
      - WMAO 受領担当(将来)
    related_artifacts:
      - "06-handoff/dpsai-to-wmao-handoff.yaml"
      - "06-handoff/seo-geo-30day-report.md"
    context: |
      handoff-protocols.md §8.4(v0.3 補遺)で B 系および自社案件の
      WMAO 引継ぎ scope は柔軟に決定する旨が明記された。
      自社案件のため、サイト運用・保守は本組織内で継続可能。
    decision_rationale: |
      WMAO に「継続コンテンツ + SEO/GEO 月次改善」のみ引継ぎ。
      サイト運用・インフラ保守・重大改修は本組織内で継続。
      これにより自社プロダクト連携(MeetingAI 等)の柔軟性を確保。
    consequences:
      positive:
        - WMAO は継続施策に集中可能
        - 本組織は自社サイトの一次保守者であり続ける
      negative:
        - WMAO 引継ぎが標準的なフルスコープではない
      mitigation:
        - dpsai-to-wmao-handoff.yaml::handoff_scope.type = partial で明示
    review_required_by: null
    superseded_by: null
    notes: ""

