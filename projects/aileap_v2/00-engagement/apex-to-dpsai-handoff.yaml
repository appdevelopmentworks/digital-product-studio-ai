# apex-to-dpsai-handoff.yaml
# AILEAP 自社サイト v2 (Phase D 検証案件)
# ---------------------------------------------------------------
# 自社案件のため apex は「Shin 自身が apex 役を兼務」する仮想ハンドオフ。
# 通常案件の apex 受領プロセスが正しく動くかを検証するために
# 通常通りのスキーマで記録する。
# ===============================================================

handoff_id: APX-20260429-001
from_org: apex-consulting-ai
to_org: digital-product-studio-ai
handoff_at: 2026-04-29
received_at: 2026-04-29
received_by: delivery-director              # dpsai 側受領

# ===============================================================
# クライアント基本情報
# ===============================================================
client:
  name: 株式会社 AILEAP
  primary_contact_name: Shin
  primary_contact_email: shin@aileap.example
  primary_contact_phone: ""
  decision_maker_name: Shin
  decision_maker_email: shin@aileap.example
  industry: AI 活用 Web 制作スタジオ / 自社 (digital-product-studio-ai を含む 3 組織アーキテクチャ)
  company_size: 設立準備中(Shin + AI エージェント 21体)
  existing_site_url: https://aileap-hazel.vercel.app

# ===============================================================
# apex が確定した戦略コンテキスト
# ===============================================================
strategic_context: |
  AILEAP は apex-consulting-ai(上流戦略)、digital-product-studio-ai(中流制作)、
  web-marketing-ai-org / WMAO(下流マーケ)の3組織アーキテクチャで構成される
  AI Native の Web 制作スタジオ。

  既存サイト(aileap-hazel.vercel.app)は v0.1 段階の試験的ランディングページで、
  以下の課題を抱える:
  - 情報量不足(サービス・実績・採用導線がない)
  - SEO 設計が弱い(構造化データ・llms.txt 未対応)
  - GEO 未対応(LLM からの参照を獲得できていない)
  - ブランドメッセージ が「同等品質を半額」を訴求しきれていない
  - 採用導線がない(エンジニア中途採用が必要)

  本改修案件で AILEAP の3組織アーキテクチャを言語化し、
  digital-product-studio-ai の差別化(AI による工数削減 + WCAG 2.2 AA + GEO 標準装備)を
  訴求できるサイトに刷新する。

  本案件はもう一つの目的を持つ: digital-product-studio-ai v0.2 の Phase D 検証案件として、
  実装したエージェント・スキル・hook・テンプレートを実プロジェクトで動作確認する。

# ===============================================================
# 案件タイプ推奨
# ===============================================================
recommended_project_type: A1                # コーポレートサイト
project_type_rationale: |
  - サービス紹介 + 採用 + 実績 + 記事 が必要 → A1 (コーポレート) が妥当
  - LP 単発(A2)では3組織アーキテクチャの説明が困難
  - メディアサイト(A3)化のニーズはあるが、Phase 2 として検討推奨

# ===============================================================
# KGI / KPI 推奨
# ===============================================================
recommended_kgi: AILEAP として月間問い合わせ件数 30件達成(公開後 6ヶ月以内)

recommended_kpi:
  - metric: オーガニック流入
    target: 1,000 UU/月
    baseline: 50 UU/月 (現状の vercel ドメインは事実上未計測)
  - metric: GEO 経由(LLM 参照)セッション
    target: 50 セッション/月
    baseline: 0 (現状未対応)
  - metric: 採用エントリー
    target: 月 5件
    baseline: 0 (現状フォームなし)
  - metric: フォーム CV 率
    target: 2.5%
    baseline: 未計測

# ===============================================================
# 想定予算・期間
# ===============================================================
budget_range:
  min_jpy: 0                                 # 自社案件のため外部請求なし
  max_jpy: 0
  retainer_likely: false                     # 自社のため Retainer は工数枠管理のみ
  retainer_range_jpy: 0
  internal_effort_hours_estimated: 200       # 工数換算(検証込み)

timeline:
  target_kickoff_at: 2026-04-29
  target_launch_at: 2026-06-15
  hard_deadline: false
  hard_deadline_reason: null

