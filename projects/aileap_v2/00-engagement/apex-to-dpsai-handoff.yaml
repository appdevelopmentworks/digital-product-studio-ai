    notes: 全面リライト前提。デザインの一部要素のみ再利用候補
  - id: APX-AST-002
    name: AILEAP 3組織アーキテクチャ図
    type: document
    location: docs/architecture.md
    notes: 既に digital-product-studio-ai リポジトリ内に存在
  - id: APX-AST-003
