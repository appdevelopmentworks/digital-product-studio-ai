    decided_by:
      - role: seo-geo-strategist
        name: seo-geo-strategist
      - role: 決裁者
        name: Shin
    proposed_by: seo-geo-strategist
    impacted_agents:
      - seo-geo-strategist
      - content-strategy-lead
      - frontend-engineer
    related_artifacts:
      - "02-strategy/seo-geo-strategy.md"
    context: |
      Phase D 戦略フェーズで sitemap と content-strategy はあったが、
      SEO/GEO 戦略の独立文書がなく、Claude の文脈推測に依存していた。
      v0.3 Phase H で正本として独立文書化。
    decision_rationale: |
      ターゲットキーワード設計・GEO 引用クエリ・構造化データ実装計画を
      明示することで、frontend-engineer / copywriter が一貫した実装を
      できるようになる。
    consequences:
