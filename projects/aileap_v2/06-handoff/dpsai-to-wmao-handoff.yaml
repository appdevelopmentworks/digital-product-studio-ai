# 本案件は自社案件のため、WMAO への引継ぎ範囲は限定スコープ
# (継続コンテンツ制作のみ — マーケ運用は本組織内で継続)。
# ===============================================================

handoff_id: HO-20260715-001
protocol: handoff-to-marketing
version: 0.3                            # v0.3 補遺(handoff-protocols.md §8.4)に従う
from:
  organization: digital-product-studio-ai
  agent: delivery-director
  timestamp: 2026-07-15T10:00:00+09:00
to:
  organization: web-marketing-ai-org
  agent: <WMAO Tier 0 agent>            # WMAO 側の受領担当
status: submitted

# ===============================================================
# プロジェクト情報
# ===============================================================
project:
  id: AILEAP-20260429-001
  client: AILEAP(自社・internal_client: true)
  type: A1                              # コーポレートサイト
  url: https://aileap.example
  staging_url: https://staging.aileap.example
  launched_at: 2026-06-15
  post_launch_period_end: 2026-07-15    # 30 日検証完了日
  apex_handoff_ref: APX-20260429-001    # apex 仮想ハンドオフ(自社のため疑似)
  internal_client: true

# ===============================================================
# 引継ぎスコープ(自社案件特有)
# ===============================================================
handoff_scope:
  type: partial                         # full / partial
  rationale: |
    本案件は AILEAP 自社サイトのため、運用継続は本組織内でも実施可能。
    WMAO に引き継ぐのは「継続コンテンツ制作」のみで、サイト運用・
    マーケ運用は本組織内で継続する。
  wmao_takes_over:
    - 継続コンテンツ制作(11 記事目以降・B-C2 境界)
    - 月次 SEO/GEO 改善(Day 31 以降・B-C1 境界)
  dpsai_retains:
    - サイト運用・保守(Vercel / microCMS / インフラ)
    - 重大障害対応・Phase 5 完了後の継続改修
    - 自社プロダクト(MeetingAI 等)のサイト連携

# ===============================================================
# 引継ぎ成果物(必須)
# ===============================================================
delivered_assets:
  strategy:
    - path: 02-strategy/sitemap.md
      description: 11 ページの情報設計
    - path: 02-strategy/content-strategy.md
      description: 4 ピラー + tone of voice
    - path: 02-strategy/seo-geo-strategy.md
      description: 主要 KW + GEO 引用最適化計画
    - path: 02-strategy/i18n-strategy.md
      description: 主要 5 ページ en 化方針
  design:
    - path: 03-design/design-system.md
      description: WCAG 2.2 AA 込みデザインシステム(§1.4 ブランド固有要素も含む)
  implementation:
    - path: 04-implementation/architecture-notes.md
    - path: 04-implementation/implementation-notes.md
  qa:
    - path: 05-qa/seo-audit.md
      result: pass
    - path: 05-qa/geo-audit.md
      result: pass
    - path: 05-qa/accessibility-audit.md
      result: pass
  launch:
    - path: 05-launch/launch-checklist.md
    - path: 05-launch/handoff-package.md
  post_launch_report:
    - path: 06-handoff/seo-geo-30day-report.md
      description: 公開後 30 日の SEO/GEO 初動分析(B-C1 境界の正本)

# ===============================================================
# クライアント関係(自社のため Shin 兼務)
# ===============================================================
client_relationship:
  decision_maker:
    name: Shin
    role: AILEAP 代表
    contact: shin@aileap.example
    preferred_channel: email
  cms_credentials:
    cms_type: Headless
    cms_name: microCMS
    admin_url: https://aileap.microcms.io/admin
    credentials_location: 別経路(1Password)で受け渡し
    notes: |
      本書には API キー・管理者パスワードを記載しない。
      WMAO 担当エージェントが受領後に Shin から直接受領する。
  cms_users:
    - role: editor
      name: WMAO continuous-content-lead(将来)
      can_publish: true
  approval_history:
    path: 00-engagement/approvals.yaml

# ===============================================================
# 公開後の目標
# ===============================================================
post_launch_targets:
  kgi:
    metric: 月間問い合わせ件数
    current_value: 5                    # ローンチ時点(Phase 5 完了時)
    target_value: 30                    # 6 ヶ月後
    target_date: 2026-12-31
  kpi:
    - metric: オーガニック流入(月間 UU)
      current_value: 100                # 30 日経過時点(seo-geo-30day-report より)
      target_value: 1000
      target_date: 2026-12-31
    - metric: GEO 流入(LLM 経由・UTM)
      current_value: 5                  # 30 日経過時点
      target_value: 50
      target_date: 2026-12-31
    - metric: LLM 引用検出件数(自社モニタリング)
      current_value: 5                  # 30 日経過時点
      target_value: 50
      target_date: 2026-12-31
    - metric: 採用エントリー
      current_value: 0
      target_value: 5                   # 月 5 件
      target_date: 2026-12-31

