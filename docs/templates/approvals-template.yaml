# ---------------------------------------------------------------
# サマリー(/approval-status で自動算出可)
# ---------------------------------------------------------------
summary:
  total_count: <<4>>
  pending_count: <<4>>
  approved_count: <<0>>
  rejected_count: <<0>>
  waived_count: <<0>>
  blocking_phase_progress: []           # 進行を阻害している APV-NNN のリスト

# ---------------------------------------------------------------
# 書き込み運用ルール (.claude/rules/approval-gate.md より)
# ---------------------------------------------------------------
# 1. status: approved を一方的に設定しない (クライアント確認時のみ)
# 2. approved を設定するときは approval_method を必ず記入
# 3. rejected エントリは削除しない (revision_history に追記)
# 4. 重要な承認イベントは decisions.yaml に DEC-NNN を作成
# 5. 1成果物バージョンに対して 1 APV (改版時は新規 APV を作成)
# 6. 承認後の変更要望は change-order プロセスへ (新規 APV は CO 経由)
# ---------------------------------------------------------------
