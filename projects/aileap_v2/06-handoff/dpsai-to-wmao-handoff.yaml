  medium_term:                          # Day 61 - 6 ヶ月
    - 11 本目以降の継続コンテンツ制作(月 2-3 本ペース)
    - キーワード順位改善施策
    - SNS 運用立ち上げ(必要に応じて)
    - 内部リンク強化
  long_term:                            # 6 ヶ月以降
    - LTV 最大化(自社プロダクト連携)
    - 顧客 NPS 向上
    - メールマガジン
    - ウェビナー連携(検討)

# ===============================================================
# 保守 SLA
# ===============================================================
maintenance:
  contract_type: internal               # 自社案件のため契約書なし
  monthly_fee_jpy: 0                    # 内部運用 — 外部請求なし
  sla:
    response_time: 24h                  # 障害発生から
    resolution_time: 72h                # 軽微な改修
    uptime_target: 99.5
  contact:
    technical: tech@aileap.example
    operational: admin@aileap.example
  responsibility_split:
    dpsai_owns:
      - サイト運用・保守
      - インフラ・セキュリティ
      - 重大改修(機能追加・デザイン変更)
    wmao_owns:
      - 継続コンテンツ制作(11 記事目以降)
      - SEO/GEO 継続施策
      - マーケティング運用(SNS / 広告)

