    type: brand-guide
    location: 未文書化(本案件で言語化が必要)
    notes: |
      暫定キーワード:
      - AI Native(AI 活用が前提)
      - 同等品質を半額(差別化軸)
      - WCAG 2.2 AA + GEO 標準装備(品質シグナル)

# ===============================================================
# 意思決定構造
# ===============================================================
decision_structure:
  approval_chain:
    - role: 決裁者 / 代表
      name: Shin
      role_description: 全決裁(自社のため単一決裁)
  decision_cycle: 自社案件のため即決可。エージェント間の判断は通常通り階層委譲
  blackout_periods: ""
  communication_preference: メール + Claude Code 内対話

# ===============================================================
# 業種特殊性 / 法務
# ===============================================================
industry_compliance:
  applicable_regulations: []
  lawyer_review_recommended: true            # コーポレートサイトでも法務3点(プライバシー / 特商法 / 利用規約)は弁護士確認推奨
  lawyer_review_reason: |
    自社サイトといえども個人情報取得(問い合わせフォーム・採用エントリー)があるため
    プライバシーポリシー・利用規約は弁護士確認推奨。
    特商法は商品販売を行わないため任意。

# ===============================================================
# 既知のリスク
# ===============================================================
known_risks:
  - risk: 自社案件のため要件が膨らみがち(検証目的とサイト目的の混同)
    mitigation: スコープを A1 標準に保ち、検証観点は validation-notes.md に分離
  - risk: 外部クライアント不在のため承認ゲートが緩くなる
    mitigation: Shin が「クライアント役」を演じて承認サイクルを回す

apex_handoff_notes: |
  本案件は Phase D 検証ケース。digital-product-studio-ai 側は通常案件と同じワークフローで
  進めること。テンプレート・スキル・hook の動作確認を最優先目的とする。

  検証で発見した課題は projects/aileap_v2/validation-notes.md に随時記録し、
  Phase E (gap-analysis-v0.2.md) でまとめて評価する。

