    superseded_by: null
    notes: ""

  # =========================================================
  # DEC-007: 多言語(en) 化を主要 5 ページに限定
  # =========================================================
  - id: DEC-007
    type: scope
    title: 多言語(en) 化を主要 5 ページに限定(top / about / services / works / contact)
    decided_at: 2026-04-30
    decided_by:
      - role: localization-specialist
        name: localization-specialist
      - role: strategy-director
        name: strategy-director
      - role: 決裁者
        name: Shin
    proposed_by: Shin                   # v0.3 着手時の論点 4 で確定
    impacted_agents:
      - localization-specialist
      - copywriter
      - frontend-engineer
    related_artifacts:
      - "02-strategy/i18n-strategy.md"
      - "PROJECT.md"
    context: |
      v0.2 Phase D では DEC-002 で en を v0.3 へ繰り延べた。
      v0.3 着手時の Shin 確認(2026-04-30)で「主要 5 ページのみ en 化」が確定。
      en 化全 11 ページは v0.4 以降に持ち越し。
    options_considered:
      - option: 主要 5 ページのみ en 化
        pros:
          - 検証スコープが明確
          - 翻訳パイプラインの本番運用検証可能
          - 工数 32h 程度に収まる
        cons:
          - 詳細ページ(services 詳細・blog 等)は ja のみ
      - option: 全 11 ページ en 化
        pros:
          - en 訴求が完全
        cons:
          - 工数 +30h 上乗せ
          - 検証スコープが膨張
    decision_rationale: |
      v0.3 検証案件として、翻訳パイプライン(DeepL → Claude → Shin)が
      動くことを確認することが最優先。詳細ページの en 化は Phase 2 / v0.4 で。
      DEC-002 を一部 supersede(en を v0.3 で実施することの確定)。
    consequences:
      positive:
        - 翻訳パイプライン本番運用が検証できる
        - hreflang / og:locale 等の SEO 多言語対応が動作確認できる
      negative:
        - en 詳細ページが将来の課題として残る
      mitigation:
        - i18n-strategy.md で 「v0.4 で en 拡張」の判定材料を明記
    review_required_by: null
    superseded_by: null
    notes: |
      DEC-002 の「en を v0.3 で実施」の方針を本決定で具体化。

  # =========================================================
  # DEC-008: 技術スタックを Next.js 14 App Router + microCMS で確定
  # =========================================================
  - id: DEC-008
    type: technical
    title: 技術スタックを Next.js 14 App Router + microCMS + Vercel で確定
    decided_at: 2026-05-01
    decided_by:
      - role: technology-director
        name: technology-director
      - role: frontend-lead
        name: frontend-lead
      - role: 決裁者
        name: Shin
    proposed_by: technology-director
    impacted_agents:
      - technology-director
      - frontend-lead
      - frontend-engineer
      - cms-engineer
      - nextjs-specialist
    related_artifacts:
      - "04-implementation/architecture-notes.md"
    context: |
      Phase H 着手時に技術スタックを正式確定する必要があった。
      Next.js / Astro / WordPress を比較。
    decision_rationale: |
      - Next.js 14 App Router: RSC で初期表示高速化 / metadata API で SEO 効率化
      - microCMS: A3 検証兼用 / 国内サポート / WordPress より軽量
      - Vercel: 既存 aileap-hazel.vercel.app からの継続性
      Astro / WordPress は却下(architecture-notes.md §1.2 参照)。
    consequences:
      positive:
        - SEO/GEO 実装が容易(metadata API + JSON-LD)
        - Lighthouse 90+ 達成見込み
        - i18n が next-intl で素直に実装可能
      negative:
        - microCMS の月額費用が発生(自社案件のため AILEAP 負担)
      mitigation:
        - microCMS 無料プランから開始、必要に応じて有料へ
    review_required_by: null
    superseded_by: null
    notes: ""

